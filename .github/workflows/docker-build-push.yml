name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Use GitHub repo env vars/secrets
  DOCKER_HUB_REPO: ${{ secrets.DOCKER_HUB_REPO }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [controller, agent]
        include:
          - component: controller
            dockerfile: Dockerfile.controller
            image_name: dfw-controller
          - component: agent
            dockerfile: Dockerfile.agent
            image_name: dfw-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          # DOCKER_HUB_REPO can be "username" or "username/reponame".
          # We extract the username part for login.
          username: ${{ secrets.DOCKER_HUB_USERNAME || (contains(secrets.DOCKER_HUB_REPO, '/') && split(secrets.DOCKER_HUB_REPO, '/')[0]) || secrets.DOCKER_HUB_REPO }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # If DOCKER_HUB_REPO contains / (e.g. myuser/dfw) use it as prefix, else treat as username and append image_name
          images: |
            ${{ contains(secrets.DOCKER_HUB_REPO, '/') && secrets.DOCKER_HUB_REPO || format('{0}/{1}', secrets.DOCKER_HUB_REPO, matrix.image_name) }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Optional: after both succeed, could trigger other things
  # But for now, this covers building both images to Docker Hub.
